spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/baitask
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

jwt.secret=mySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLongRandomSecret
jwt.access-token-exp-ms=900000
jwt.refresh-token-exp-ms=604800000

rate-limit.max-attempts=5
rate-limit.lock-duration-minutes=5